<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solvee</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto}
body{background:#0a0a0a;color:#fff;overflow:hidden}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
.container{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:auto;padding:10px}
.chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.msg{padding:12px 16px;border-radius:16px;max-width:80%;line-height:1.4}
.user{align-self:flex-end;background:#2563eb}
.bot{align-self:flex-start;background:#1f2937}
.input-area{display:flex;gap:10px;padding:10px}
input{flex:1;padding:14px;border:none;border-radius:12px;background:#111;color:#fff;font-size:16px}
button{padding:14px 18px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:16px;cursor:pointer}
button:active{transform:scale(0.95)}
@media(max-width:600px){
.msg{max-width:90%}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="container">
<div class="chat" id="chat"></div>
<div class="input-area">
<input id="input" placeholder="Type your message..."/>
<button onclick="send()">Send</button>
</div>
</div>
<script>
const chat=document.getElementById("chat")
const input=document.getElementById("input")

function addMessage(text,type){
const div=document.createElement("div")
div.className="msg "+type
div.textContent=text
chat.appendChild(div)
chat.scrollTop=chat.scrollHeight
}

async function send(){
const text=input.value.trim()
if(!text)return
addMessage(text,"user")
input.value=""
const res=await fetch("/api/ai?prompt="+encodeURIComponent(text))
const data=await res.text()
addMessage(data,"bot")
}

input.addEventListener("keydown",e=>{
if(e.key==="Enter")send()
})

const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true})
renderer.setSize(window.innerWidth,window.innerHeight)

const geometry=new THREE.BufferGeometry()
const vertices=[]
for(let i=0;i<1000;i++){
vertices.push((Math.random()-0.5)*2000)
vertices.push((Math.random()-0.5)*2000)
vertices.push((Math.random()-0.5)*2000)
}
geometry.setAttribute('position',new THREE.Float32BufferAttribute(vertices,3))
const material=new THREE.PointsMaterial({color:0x2563eb,size:2})
const points=new THREE.Points(geometry,material)
scene.add(points)

camera.position.z=500

function animate(){
requestAnimationFrame(animate)
points.rotation.x+=0.0005
points.rotation.y+=0.001
renderer.render(scene,camera)
}
animate()

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)
})
</script>
</body>
</html>
